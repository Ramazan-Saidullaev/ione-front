<svg width="920" height="720" viewBox="0 0 920 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D1FAE5"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>

    <style>
      .tTitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; fill: #0F172A; }
      .tLabel { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; fill: #0F172A; }
      .tMuted { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; fill: #475569; }
      .tMono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; fill: #0F766E; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="720" rx="48" fill="url(#g1)"/>

  <circle cx="720" cy="160" r="98" fill="#BBF7D0" opacity="0.8"/>
  <circle cx="790" cy="250" r="54" fill="#BFDBFE" opacity="0.8"/>
  <circle cx="640" cy="300" r="42" fill="#FDE68A" opacity="0.75"/>

  <g filter="url(#shadow)">
    <rect x="120" y="190" width="520" height="360" rx="28" fill="#FFFFFF"/>
    <text x="160" y="226" class="tMono" font-size="12">МИКРО‑УРОК</text>
    <text x="160" y="254" class="tTitle" font-size="20">Финансовая грамотность</text>
    <text x="160" y="278" class="tMuted" font-size="14">2–3 минуты · квиз после просмотра</text>

    <rect x="160" y="330" width="420" height="92" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="190" y="362" class="tLabel" font-size="14">Квиз</text>
    <text x="190" y="384" class="tMuted" font-size="13">Проверка понимания сразу после урока</text>

    <rect x="160" y="446" width="420" height="80" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="190" y="476" class="tLabel" font-size="14">Сценарий</text>
    <text x="190" y="498" class="tMuted" font-size="13">Выбор → последствия → вывод</text>

    <rect x="430" y="232" width="150" height="34" rx="17" fill="url(#g2)"/>
    <text x="505" y="254" text-anchor="middle" class="tLabel" font-size="13" fill="#052e2b">Начать</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="610" y="380" width="180" height="170" rx="28" fill="#FFFFFF"/>
    <text x="644" y="414" class="tMono" font-size="11">ПРОГРЕСС</text>
    <text x="644" y="438" class="tLabel" font-size="14">Неделя</text>
    <rect x="644" y="506" width="120" height="14" rx="7" fill="#BBF7D0"/>
    <text x="644" y="532" class="tMuted" font-size="12">Стабильный темп</text>
  </g>
</svg>
