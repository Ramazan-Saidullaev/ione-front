<svg width="920" height="620" viewBox="0 0 920 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>

    <style>
      .tTitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; fill: #0F172A; }
      .tLabel { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; fill: #0F172A; }
      .tMuted { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; fill: #475569; }
      .tMono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; fill: #0F766E; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="620" rx="48" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="110" width="700" height="400" rx="28" fill="#FFFFFF"/>

    <text x="160" y="154" class="tMono" font-size="12">ПАНЕЛЬ УЧИТЕЛЯ</text>
    <text x="160" y="184" class="tTitle" font-size="20">Прогресс и результаты</text>
    <text x="160" y="208" class="tMuted" font-size="13">Курсы · тесты · зоны риска</text>

    <rect x="160" y="246" width="300" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="190" y="274" class="tLabel" font-size="14">Курс: Финансы</text>
    <text x="190" y="296" class="tMuted" font-size="12">12/16 уроков · 75%</text>

    <rect x="490" y="246" width="270" height="140" rx="22" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="520" y="274" class="tLabel" font-size="14">Тест: самочувствие</text>
    <text x="520" y="296" class="tMuted" font-size="12">RED/BLACK: 3 ученика</text>

    <rect x="160" y="406" width="600" height="70" rx="22" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="190" y="428" class="tLabel" font-size="14">Быстрые действия</text>
    <text x="190" y="450" class="tMuted" font-size="12">Открыть отчёт · Напомнить · Посмотреть риски</text>
    <rect x="430" y="428" width="160" height="22" rx="11" fill="url(#accent)"/>
    <text x="510" y="444" text-anchor="middle" class="tLabel" font-size="12" fill="#052e2b">Открыть</text>
  </g>
</svg>
