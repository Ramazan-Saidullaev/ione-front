<svg width="920" height="620" viewBox="0 0 920 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>

    <style>
      .tTitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 800; fill: #0F172A; }
      .tLabel { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; fill: #0F172A; }
      .tMuted { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 600; fill: #475569; }
      .tMono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; fill: #0F766E; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="620" rx="48" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="100" y="110" width="720" height="400" rx="28" fill="#FFFFFF"/>
    <text x="160" y="164" class="tMono" font-size="12">УРОК</text>
    <text x="160" y="194" class="tTitle" font-size="20">Кибербезопасность</text>
    <text x="160" y="220" class="tMuted" font-size="13">Как распознать фишинг и защитить данные</text>

    <rect x="160" y="284" width="500" height="86" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="190" y="312" class="tLabel" font-size="14">Шаг 1: посмотрели</text>
    <text x="190" y="336" class="tMuted" font-size="13">Короткий блок, без перегруза</text>

    <rect x="160" y="392" width="500" height="86" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="190" y="420" class="tLabel" font-size="14">Шаг 2: закрепили</text>
    <text x="190" y="444" class="tMuted" font-size="13">Квиз + сценарий по ситуации</text>

    <rect x="690" y="284" width="90" height="194" rx="18" fill="#ECFDF5" stroke="#BBF7D0"/>
    <text x="700" y="308" class="tMono" font-size="10">ПРОГРЕСС</text>
    <text x="700" y="330" class="tMuted" font-size="12">Сегодня</text>
    <rect x="712" y="316" width="46" height="10" rx="5" fill="#34D399"/>
    <rect x="712" y="340" width="46" height="10" rx="5" fill="#A7F3D0"/>
    <rect x="712" y="364" width="46" height="10" rx="5" fill="#A7F3D0"/>
    <rect x="712" y="388" width="46" height="10" rx="5" fill="#A7F3D0"/>
    <text x="700" y="468" class="tMuted" font-size="11">+5 мин</text>
  </g>
</svg>
